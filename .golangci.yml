version: "2"
linters:
  enable:
    - bidichk
    - dogsled
    - forcetypeassert
    - gocritic
    - gocyclo
    - godot
    - nilerr
    - nilnil
    - prealloc
    - revive
    - sloglint
    - wastedassign
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
