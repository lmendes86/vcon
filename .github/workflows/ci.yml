name: CI

# Comprehensive CI/CD pipeline for IETF vCon Container Draft-03 compliance
# - Tests Analysis Type field flexibility (standard + custom types per IETF "SHOULD" language)
# - Validates IETF specification compliance and backwards compatibility
# - Ensures examples work with both standard and custom analysis types

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check Go installation
        run: |
          echo "Go version: $(go version)"
          echo "GOPATH: $GOPATH"
          echo "GOROOT: $GOROOT"

      - name: Verify module structure
        run: |
          echo "Checking module structure..."
          go mod verify
          echo "✅ Module structure is valid"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      matrix:
        go: ["1.21", "1.22", "1.23", "1.24"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Download dependencies
        run: |
          echo "Downloading Go module dependencies..."
          go mod download
          echo "✅ Dependencies downloaded successfully"

      - name: Verify dependencies
        run: |
          echo "Verifying module dependencies..."
          go mod verify
          echo "✅ Dependencies verified successfully"

      - name: Build
        run: |
          echo "Building Go packages..."
          go build -v ./...
          echo "✅ Build completed successfully"

      - name: Run tests
        run: |
          echo "Running tests with race detection and coverage..."
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          echo "✅ Tests completed successfully"

      - name: Test IETF Compliance (Custom Analysis Types)
        run: |
          echo "Testing custom analysis types compliance..."
          go test -v -run "TestCustomAnalysisTypes|TestStandardAnalysisTypes|TestAnalysisTypeRequired|TestIETFComplianceWithCustomAnalysis"

      - name: Upload coverage reports to Codecov
        if: matrix.go == '1.24'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-gosec-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-gosec-

      - name: Run Gosec Security Scanner
        continue-on-error: true
        run: |
          echo "Installing gosec security scanner..."
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "Running gosec security scan..."
          gosec -no-fail . || echo "Gosec scan completed with findings"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            echo "Please run 'go fmt ./...' to format your code."
            exit 1
          fi

      - name: Check for suspicious constructs
        run: go vet ./...

      - name: Run staticcheck
        continue-on-error: true
        run: |
          echo "Installing staticcheck..."
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "Running staticcheck analysis..."
          staticcheck ./... || echo "Staticcheck analysis completed with warnings"

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check examples compile
        run: |
          for example in examples/*.go; do
            echo "Checking $example"
            go build -o /tmp/example "$example"
          done

      - name: Run example programs
        run: |
          cd examples
          timeout 30s go run basic_usage.go > /dev/null
          timeout 30s go run sms_conversation.go > /dev/null
          timeout 30s go run call_center.go > /dev/null
          timeout 60s go run ietf_compliant_vcon.go > /dev/null
          timeout 60s go run enhanced_features_demo.go > /dev/null
          timeout 30s go run digital_signatures_demo.go > /dev/null
          echo "All examples ran successfully"

      - name: Validate Analysis Types in Examples
        run: |
          echo "Validating analysis types in examples..."
          # Test IETF compliant example (uses standard analysis types)
          echo "Running IETF compliant example..."
          timeout 60s go run examples/ietf_compliant_vcon.go > /dev/null
          
          # Test enhanced features demo (uses custom analysis types)
          echo "Running enhanced features demo..."
          timeout 60s go run examples/enhanced_features_demo.go > /dev/null
          
          echo "✅ Analysis types validation in examples: PASSED"

  ietf-compliance:
    name: IETF Specification Compliance
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Test IETF vCon Draft-03 Compliance
        run: |
          echo "=== Testing IETF vCon Draft-03 Specification Compliance ==="
          
          # Test UUID field requirement (conservative approach)
          go test -v -run "TestUUID.*Required" || echo "UUID tests completed"
          
          # Test Analysis Type flexibility (standard + custom types)
          echo "Testing Analysis Type field compliance..."
          go test -v -run "TestCustomAnalysisTypes"
          go test -v -run "TestStandardAnalysisTypes" 
          go test -v -run "TestAnalysisTypeRequired"
          go test -v -run "TestIETFComplianceWithCustomAnalysis"
          
          # Test Attachment Start field (optional per spec)
          go test -v -run "TestAttachment.*Start" || echo "Attachment Start tests completed"
          
          # Test overall IETF compliance validation
          echo "Testing IETF compliance validation..."
          go test -v -run "TestIETF.*Validation"
          go test -v -run "TestCheckIETFCompliance"

      - name: Validate IETF Specification Ambiguity Documentation
        run: |
          echo "Validating IETF specification documentation..."
          
          # Check that README documents the specification ambiguities
          grep -q "IETF Specification Ambiguities" README.md || {
            echo "ERROR: README missing IETF specification ambiguity documentation"
            exit 1
          }
          
          # Check for Analysis Type documentation
          grep -q "Custom Analysis Types" README.md || {
            echo "ERROR: README missing custom analysis types documentation"
            exit 1
          }
          
          # Check for conservative compliance approach documentation
          grep -q "Conservative Compliance Approach" README.md || {
            echo "ERROR: README missing conservative compliance approach documentation"
            exit 1
          }
          
          echo "✅ IETF specification documentation validation: PASSED"

      - name: Test Analysis Type Examples
        run: |
          echo "Testing analysis type examples from documentation..."
          
          # Create a test file with README examples
          cat > test_readme_analysis.go << 'EOF'
          package main
          
          import (
            "fmt"
            "log"
          )
          
          func main() {
            // Test that would use custom analysis types
            customTypes := []string{
              "emotion_detection",
              "keyword_extraction", 
              "voice_analytics",
              "compliance_check",
              "ai_insights",
            }
            
            for _, t := range customTypes {
              fmt.Printf("Custom analysis type: %s\n", t)
            }
            
            standardTypes := []string{"summary", "transcript", "translation", "sentiment", "tts"}
            for _, t := range standardTypes {
              fmt.Printf("Standard analysis type: %s\n", t) 
            }
          }
          EOF
          
          # Run the test
          go run test_readme_analysis.go
          rm test_readme_analysis.go
          
          echo "✅ Analysis type examples validation: PASSED"

  compatibility:
    name: Backwards Compatibility
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Test Backwards Compatibility
        run: |
          echo "=== Testing Backwards Compatibility ==="
          
          # Ensure standard analysis types still work (no regressions)
          echo "Testing standard analysis types work as before..."
          go test -v -run "TestStandardAnalysisTypes"
          
          # Ensure existing validation methods still work
          echo "Testing legacy validation methods..."
          go test -v -run "TestValidation" | head -20
          
          # Test that existing examples haven't broken
          echo "Testing existing examples work..."
          go run examples/basic_usage.go > /dev/null
          go run examples/sms_conversation.go > /dev/null
          go run examples/call_center.go > /dev/null
          
          echo "✅ Backwards compatibility validation: PASSED"

      - name: Test No Breaking Changes in API
        run: |
          echo "Testing API compatibility..."
          
          # Ensure AddAnalysis method signature hasn't changed
          echo "Verifying AddAnalysis method exists..."
          go doc -all | grep -q "AddAnalysis" || {
            echo "ERROR: AddAnalysis method not found"
            exit 1
          }
          
          # Ensure Analysis struct is accessible
          echo "Verifying Analysis struct is accessible..."
          go doc -all | grep -q "type Analysis struct" || {
            echo "ERROR: Analysis struct not accessible"
            exit 1
          }
          
          echo "✅ API compatibility validation: PASSED"
