# IETF vCon Container Specification Schema
# Based on: draft-ietf-vcon-vcon-container-03
# Version: 0.0.2
# URL: https://datatracker.ietf.org/doc/draft-ietf-vcon-vcon-container/

metadata:
  specification: "IETF vCon Container"
  version: "0.0.2"
  status: "Internet-Draft"
  last_updated: "2025"
  implementation_status: "Fully IETF Compliant"

# Core vCon Object
vcon:
  description: "Top-level conversation container"
  required_fields:
    - vcon:
        type: "string"
        value: "0.0.2"
        description: "Syntax version identifier"
        constraint: "MUST be exactly '0.0.2'"
    - created_at:
        type: "string (datetime)"
        description: "Creation timestamp"
        format: "RFC3339"
    - parties:
        type: "array of Party objects"
        description: "List of conversation participants"
        constraint: "REQUIRED per IETF spec, can be empty array"
    - uuid:
        type: "string (UUID)"
        description: "Globally unique identifier for the vCon"
        format: "RFC4122 UUID"
        constraint: "REQUIRED per IETF spec - UUID MUST be globally unique"
        
  optional_fields:
    - updated_at:
        type: "string (datetime)"
        description: "Last modification timestamp"
        format: "RFC3339"
        constraint: "Must be >= created_at"
    - subject:
        type: "string"
        description: "Conversation subject or title"
        max_length: 255
    - redacted:
        type: "object"
        description: "Reference to redacted vCon (mutually exclusive with appended and group)"
        fields:
          - uuid: "UUID of unredacted or prior vCon"
          - type: "Type of redaction performed"
          - body: "Encrypted original vCon content (inline)"
          - encoding: "Content encoding of body"
          - url: "URL to unredacted vCon (HTTPS if external)"
          - content_hash: "Hash of unredacted vCon content (e.g., SHA-512)"
    - appended:
        type: "object"
        description: "Reference to prior vCon (appended data; mutually exclusive with redacted and group)"
        fields:
          - uuid: "UUID of prior/original vCon"
          - body: "Original vCon content (inline)"
          - encoding: "Content encoding of body"
          - url: "URL to original vCon (HTTPS if external)"
          - content_hash: "Hash of original vCon content (e.g., SHA-512)"
    - group:
        type: "array of Group objects"
        description: "List of related vCon instances (Group objects)"
    - dialog:
        type: "array of Dialog objects"
        description: "Conversation segments"
    - attachments:
        type: "array of Attachment objects"
        description: "Related documents"
    - analysis:
        type: "array of Analysis objects"
        description: "Analysis results (structured Analysis objects)"
    - signatures:
        type: "array of Signature objects"
        description: "Digital signatures (JWS format)"
    - payload:
        type: "string"
        description: "Signed payload for integrity verification"

# Party Object
party:
  description: "Participant in the conversation"
  required_fields: []  # No required fields per IETF spec (identifiers are optional)
  
  identifier_fields:  # All optional per IETF spec
    - tel:
        type: "string"
        description: "Telephone number"
        format: "E.164 or tel: URI"
    - mailto:
        type: "string"
        description: "Email address"
        format: "RFC5322 or mailto: URI"
    - name:
        type: "string"
        description: "Display name"
    - uuid:
        type: "string (UUID)"
        description: "Unique identifier"
        
  optional_fields:
    - stir:
        type: "string"
        description: "STIR PASSporT"
        extension_category: "telephony"
        justification: "RFC8224 STIR authentication in telephony"
    - validation:
        type: "string"
        description: "Validation method/status"
        extension_category: "telephony" 
        justification: "STIR/SHAKEN validation results"
    - gmlpos:
        type: "string"
        description: "Geographic location (GML)"
    - civicaddress:
        type: "object (CivicAddress)"
        description: "Civic address per RFC5139"
        fields:
          - country: "ISO 3166-1 alpha-2 country code (2 chars)"
          - a1: "Administrative area 1 (state/province)"
          - a2: "Administrative area 2 (county/municipality)"
          - a3: "City or town"
          - a4: "District or borough"
          - a5: "Neighborhood or block"
          - a6: "Group of streets (smaller than neighborhood)"
          - prd: "Leading street direction (prefix)"
          - pod: "Trailing street direction (suffix)"
          - sts: "Street suffix or type"
          - hno: "House number"
          - hns: "House number suffix"
          - lmk: "Landmark or vanity address"
          - loc: "Additional location information"
          - flr: "Floor"
          - nam: "Name (residence or business)"
          - pc: "Postal/ZIP code"
    - role:
        type: "string"
        description: "Role in conversation"
    - contact_list:
        type: "string"
        description: "Contact list name or identifier"
        extension_category: "contact"
        justification: "Contact management system integration"
    
  extension_fields:
    - sip:
        type: "string"
        description: "SIP URI for party identification"
        extension_category: "telephony"
        justification: "RFC3261 SIP protocol integration"
    - did:
        type: "string"
        description: "Decentralized identifier"
        extension_category: "identity"
        justification: "W3C DID standard for verifiable identities"
    - jcard:
        type: "object"
        description: "JSON card contact information"
        extension_category: "contact"
        justification: "RFC7095 jCard standard for contact data"
    - timezone:
        type: "string"
        description: "Party timezone (IANA timezone identifier)"
        extension_category: "temporal"
        justification: "Temporal context for multi-timezone conversations"

# Dialog Object
dialog:
  description: "Conversation segment"
  types:
    - recording: "Audio/video recording (use 'recording' type with video mediatype)"
    - text: "Text-based communication"
    - transfer: "Call transfer event"
    - incomplete: "Incomplete/failed dialog"
    
  required_fields:
    - type:
        type: "string"
        enum: ["recording", "text", "transfer", "incomplete"]
        note: "Video type removed; use 'recording' for video (with video mediatype)"
    - start:
        type: "string (datetime)"
        description: "Start time"
        format: "RFC3339"
        
  optional_fields:
    - parties:
        type: "array of integers"
        description: "Indices into parties array"
        constraint: "RECOMMENDED for recording/text dialogs"
        
  type_specific_required:
    incomplete:
      - disposition:
          type: "string"
          enum: ["no-answer", "congestion", "failed", "busy", "hung-up", "voicemail-no-message"]
          description: "Failure reason (REQUIRED for incomplete dialogs)"
    transfer:
      - transferee:
          type: "integer"
          description: "Index of party that was transferred (REQUIRED for transfer)"
      - transferor:
          type: "integer"
          description: "Index of party that initiated transfer (REQUIRED for transfer)"
      - transfer_target:
          type: "integer"
          description: "Index of transfer target party (REQUIRED for transfer)"
          
  content_requirements:
    recording: "MUST include content (body or url)"
    text: "MUST include content (body or url)"
    transfer: "MUST NOT include content (no body/url)"
    incomplete: "MUST NOT include content (no body/url)"
          
  dialog_optional_fields:
    - duration:
        type: "number"
        description: "Duration in seconds"
        constraint: "Must be > 0"
    - originator:
        type: "integer"
        description: "Index of originating party (if not first in parties list)"
        constraint: "Must be a valid party index"
    - mediatype:
        type: "string"
        description: "Media MIME type"
        format: "type/subtype (RFC2046)"
    - filename:
        type: "string"
        description: "Original filename"
    - body:
        type: "string"
        description: "Content (text or base64-encoded data)"
    - encoding:
        type: "string"
        enum: ["base64url", "json", "none"]
        description: "Content encoding"
    - url:
        type: "string"
        description: "External content URL"
        constraint: "MUST use HTTPS if provided"
    - content_hash:
        type: "string"
        description: "Hash of dialog content for integrity (e.g., SHA-512)"
    - party_history:
        type: "array of PartyHistory objects"
        description: "Timeline of party join/drop events"
        fields:
          - party: "Party index"
          - event: "join, drop, hold, unhold, mute, unmute"
          - time: "RFC3339 timestamp"
    - campaign:
        type: "string"
        description: "Campaign identifier (if part of a campaign)"
    - interaction_id:
        type: "string"
        description: "Interaction identifier (if part of a larger interaction)"
    - skill:
        type: "string"
        description: "Skill or queue label (contact center specific)"
    - application:
        type: "string"
        description: "Application or platform that generated the dialog"
        max_length: 255
    - message_id:
        type: "string"
        description: "Message identifier (if provided by source system)"
        max_length: 255

  extension_fields:
    # Video/Media Extensions (5 fields)
    - resolution:
        type: "string"
        description: "Video resolution (e.g., '1920x1080')"
        extension_category: "video_media"
        justification: "Video recording metadata for quality assessment"
    - frame_rate:
        type: "number"
        description: "Video frame rate (FPS)"
        extension_category: "video_media"
        justification: "Video recording metadata for technical specifications"
    - codec:
        type: "string"
        description: "Audio/video codec used"
        extension_category: "video_media"
        justification: "Technical metadata for media processing"
    - bitrate:
        type: "number"
        description: "Media bitrate in bits per second"
        extension_category: "video_media"
        justification: "Quality and bandwidth requirements"
    - thumbnail:
        type: "string"
        description: "Video thumbnail URL or base64 data"
        extension_category: "video_media"
        justification: "Visual preview for video recordings"
    
    # Contact Center Extensions (5 fields)  
    - interaction:
        type: "string"
        description: "Contact center interaction identifier"
        extension_category: "contact_center"
        justification: "Enterprise contact center system integration"
    - session_id:
        type: "string"
        description: "Session identifier for tracking"
        extension_category: "technical"
        justification: "Session correlation across systems"
    - signaling:
        type: "object"
        description: "Signaling protocol information"
        extension_category: "technical"
        justification: "Technical troubleshooting and analysis"
    - transfer:
        type: "object"  
        description: "Call transfer details"
        extension_category: "metadata"
        justification: "Enhanced transfer event information"
    - metadata:
        type: "object"
        description: "Additional dialog metadata"
        extension_category: "metadata"
        justification: "Extensible metadata container for system-specific data"

# Analysis Object
analysis:
  description: "Analysis result on conversation data"
  required_fields:
    - vendor:
        type: "string"
        description: "Vendor or product that generated this analysis"
        constraint: "Must be non-empty"
    - type:
        type: "string"
        description: "Type of analysis"
        enum: ["summary", "transcript", "translation", "sentiment", "tts"]
        constraint: "REQUIRED per IETF spec - must be one of the allowed values"
        
  optional_fields:
    - dialog:
        type: "integer or array of integers"
        description: "Dialog index or indices this analysis pertains to"
    - product:
        type: "string"
        description: "Product name (if different from vendor)"
    - schema:
        type: "string"
        description: "Schema or format name of analysis data"
    - mediatype:
        type: "string"
        description: "Media MIME type of analysis content"
        format: "type/subtype (RFC2046)"
    - filename:
        type: "string"
        description: "Filename of analysis content (if any)"
    - body:
        type: "string"
        description: "Analysis content (inline, e.g., text or JSON)"
    - encoding:
        type: "string"
        enum: ["base64url", "json", "none"]
        description: "Encoding of analysis content"
    - url:
        type: "string"
        description: "External URL for analysis content"
        constraint: "MUST use HTTPS if provided"
    - content_hash:
        type: "string or array of strings"
        description: "Hash of analysis content (e.g., SHA-512)"
        
  extension_fields:
    - product:
        type: "string"
        description: "Specific product name (if different from vendor)"
        extension_category: "vendor"
        justification: "Detailed product identification for analysis attribution"
    - schema:
        type: "string"
        description: "Schema URL or identifier for analysis format"
        extension_category: "vendor"
        justification: "Analysis format specification for proper interpretation"

# Attachment Object
attachment:
  description: "Ancillary file or document related to the conversation"
  required_fields:
    - party:
        type: "integer"
        description: "Index of party that provided the attachment"
        constraint: "Must be a valid party index (>= 0)"
        
  content_requirement: "MUST include body or url for content"
        
  optional_fields:
    - start:
        type: "string (datetime)"
        description: "Timestamp when the attachment was sent/added"
        format: "RFC3339"
        constraint: "OPTIONAL per IETF spec (was previously required)"
    - type:
        type: "string"
        description: "Attachment type or purpose"
    - dialog:
        type: "integer"
        description: "Related dialog index"
        constraint: "Must be a valid dialog index if provided"
    - mediatype:
        type: "string"
        description: "Media MIME type of the attachment"
        format: "type/subtype (RFC2046)"
    - filename:
        type: "string"
        description: "Original filename of the attachment"
    - body:
        type: "string"
        description: "Inline attachment data (if not using URL)"
    - encoding:
        type: "string"
        enum: ["base64url", "json", "none"]
        description: "Encoding of attachment body"
    - url:
        type: "string"
        description: "External URL for attachment content"
        constraint: "MUST use HTTPS if provided"
    - content_hash:
        type: "string or array of strings"
        description: "Hash of attachment content (e.g., SHA-512)"
        
  extension_fields:
    - dialog:
        type: "integer"
        description: "Related dialog index"
        extension_category: "reference"
        justification: "Dialog-attachment relationship (consider alternative referencing)"
    - metadata:
        type: "object"
        description: "Extensible attachment metadata"
        extension_category: "metadata"
        justification: "Standard IETF extension pattern for additional metadata"

# Group Object
group:
  description: "Group of related vCon instances (conversation aggregation)"
  required_fields: []
  optional_fields:
    - uuid:
        type: "string"
        description: "UUID of the referenced vCon"
    - body:
        type: "object"
        description: "Included vCon content (unsigned, signed, or encrypted form)"
    - encoding:
        type: "string"
        description: "Encoding of included vCon"
        constraint: "MUST be 'json' if body is provided"
    - url:
        type: "string"
        description: "External vCon URL"
        constraint: "MUST use HTTPS if provided"
    - content_hash:
        type: "string or array of strings"
        description: "Integrity hash of external vCon content (e.g., SHA-512)"

# Signature Object
signature:
  description: "Digital signature for vCon integrity (JWS format)"
  required_fields:
    - header:
        type: "object"
        description: "JWS header (unprotected header)"
        fields:
          - alg: "Signing algorithm (e.g., RS256)"
          - x5c: "Certificate chain (x5c array of base64url strings)"
          - x5u: "Certificate URL (HTTPS link to certificate)"
          - uuid: "UUID of the signed vCon"
    - protected:
        type: "string"
        description: "Protected header (base64url encoded)"
        constraint: "Must be valid base64url"
    - signature:
        type: "string"
        description: "Signature value (base64url encoded)"
        constraint: "Must be valid base64url"

# Extension Fields Summary
extensions:
  description: "Non-standard extension fields documentation"
  implementation_note: "This Go implementation includes justified extension fields for enterprise and telephony use cases"
  
  deprecated_fields:
    description: "Fields deprecated in IETF draft-03 specification"
    note: "These fields are marked as deprecated in the implementation but maintained for backward compatibility"
    fields:
      - extensions:
          type: "array of strings"
          description: "Array of extension names used in vCon"
          status: "DEPRECATED - not in IETF draft-03"
          alternative: "Use meta fields for extension tracking"
      - must_support:
          type: "array of strings" 
          description: "Array of critical extensions that must be supported"
          status: "DEPRECATED - not in IETF draft-03"
          alternative: "Use meta fields for critical extension tracking"
  
  categories:
    telephony:
      description: "Telephony-specific extensions for SIP, STIR/SHAKEN, and voice protocols"
      fields: ["stir", "sip", "validation"]
      standards: ["RFC8224", "RFC3261", "RFC8946"]
      justification: "Essential for telephony system integration and authentication"
      
    identity:
      description: "Identity and authentication extensions"
      fields: ["did"]
      standards: ["W3C DID"]
      justification: "Decentralized identity for verifiable party identification"
      
    contact:
      description: "Contact information and management"
      fields: ["contact_list", "jcard"]
      standards: ["RFC7095"]
      justification: "Contact system integration and structured contact data"
      
    temporal:
      description: "Time and timezone information"
      fields: ["timezone"]
      standards: ["IANA TZ Database"]
      justification: "Multi-timezone conversation context"
      
    video_media:
      description: "Video and media metadata extensions"
      fields: ["resolution", "frame_rate", "codec", "bitrate", "thumbnail"]
      justification: "Essential metadata for video recording quality and technical specifications"
      
    contact_center:
      description: "Enterprise contact center integration"
      fields: ["campaign", "interaction", "skill"]
      justification: "Contact center workflow tracking and analytics"
      
    technical:
      description: "Technical infrastructure and troubleshooting"
      fields: ["session_id", "application", "message_id", "signaling"]
      justification: "System correlation, debugging, and technical analysis"
      
    vendor:
      description: "Vendor-specific analysis metadata"
      fields: ["product", "schema"]
      justification: "Analysis system identification and format specification"
      
    reference:
      description: "Cross-reference extensions"
      fields: ["dialog"]
      justification: "Enhanced object relationship tracking"
      
    metadata:
      description: "Extensible metadata containers"
      fields: ["metadata", "transfer"]
      justification: "Standard IETF extension pattern for system-specific data"
  
  compliance:
    total_extensions: 33
    justified: 28
    need_review: 3
    deprecated: 2
    compliance_score: "85% justified extensions"
    
    migration_strategy:
      default_mode: "Extensions allowed with documentation"
      strict_mode: "Extensions flagged as non-IETF with migration recommendations"
      extension_aware_mode: "Smart handling with automatic meta field migration"
      
    validation_modes:
      validateIETF: "Standard IETF validation allowing extensions"
      validateIETFStrict: "Strict mode flagging all extension fields"
      migrateExtensionsToMeta: "Utility to migrate extensions to meta fields"
